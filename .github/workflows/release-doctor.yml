name: Release Doctor
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  release_doctor:
    name: release doctor
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'codex/release-') || startsWith(github.head_ref, 'autogen/promote-sdk-')

    steps:
      - uses: actions/checkout@v6

      - name: Check release environment
        run: |
          bash ./bin/check-release-environment
        env:
          PYPI_TOKEN: ${{ secrets.FIREWORKS_PYPI_TOKEN || secrets.PYPI_TOKEN }}

name: Prepare Prerelease

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: prepare prerelease
    if: github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.head_ref, 'autogen/promote-sdk-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}

      - name: Prepare prerelease metadata
        run: python scripts/prepare_prerelease.py --base-ref "${{ github.base_ref }}"

      - name: Commit prerelease metadata
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No prerelease metadata changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .release-please-manifest.json CHANGELOG.md pyproject.toml src/fireworks/_version.py
          git commit -m "release: prepare prerelease"
          git push origin "HEAD:${{ github.head_ref }}"

name: Security Audit

on:
  schedule:
    - cron: "0 0 * * 1"
  pull_request:
    paths:
      - "requirements*.lock"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.lock --desc on
        continue-on-error: false

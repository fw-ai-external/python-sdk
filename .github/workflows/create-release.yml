name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - ".release-please-manifest.json"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - "src/fireworks/_version.py"
      - "src/fireworks/**"

permissions:
  contents: write

jobs:
  release:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Stop if release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        if: steps.existing.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY' > /tmp/release-notes.md
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## {re.escape(version)} \\([^)]*\\)\\n\\n(?P<body>.*?)(?=^## |\\Z)",
              text,
              flags=re.MULTILINE | re.DOTALL,
          )
          print((match.group("body") if match else "").strip() or f"Release {version}")
          PY

      - name: Create GitHub release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --target "${GITHUB_SHA}" \
            --title "${TAG}" \
            --notes-file /tmp/release-notes.md

      - name: Install Rye
        if: steps.existing.outputs.exists == 'false'
        run: |
          curl -sSf https://rye.astral.sh/get | bash
          echo "$HOME/.rye/shims" >> $GITHUB_PATH
        env:
          RYE_VERSION: '0.44.0'
          RYE_INSTALL_OPTION: '--yes'

      - name: Publish to PyPI
        if: steps.existing.outputs.exists == 'false'
        run: bash ./bin/publish-pypi
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
